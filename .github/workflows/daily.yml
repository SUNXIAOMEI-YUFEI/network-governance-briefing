# 每日选题流水线：抓 RSS → LLM 评分 → 聚类 → 出 today.json → 提交到仓库
#
# 触发方式：
#   1. 每天定时跑（错峰双触发，规避 GitHub Actions 整点 cron 拥堵）
#      - UTC 06:17（北京 14:17）主跑
#      - UTC 07:17（北京 15:17）兜底（若 14:17 已成功跑过、DB 无新文章，则自动 skip commit）
#   2. 手动在 GitHub Actions 页面点 "Run workflow"
#   3. push 代码时冒烟测试（只跑 mock 数据，不消耗 LLM 额度）
#
# 为什么不用 "0 6 * * *"？
#   GitHub Actions 免费版 cron 在整点（especially UTC 06:00 = 全球高峰）经常被
#   延迟 30-90 分钟甚至完全跳过。错峰到 :17 + 加兜底场次能把"漏跑"概率压到极低。

name: Daily Briefing Pipeline

on:
  schedule:
    - cron: "17 6 * * *"  # 北京 14:17 主跑
    - cron: "17 7 * * *"  # 北京 15:17 兜底
  workflow_dispatch:
    inputs:
      hours:
        description: "抓取时间窗（小时）"
        required: false
        default: "24"
      use_mock:
        description: "用 mock 数据（冒烟测试，不调 LLM）"
        type: boolean
        required: false
        default: false
      rescore_all:
        description: "⚠️ 重新评分全部文章（会覆盖已有评分，LLM 波动可能让高分跌分。仅 prompt 升级时使用）"
        type: boolean
        required: false
        default: false
  push:
    branches: [main, master]
    paths:
      - "app/**"
      - "scripts/**"
      - ".github/workflows/daily.yml"
      - "app/data/mock_articles.json"

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # 关键：让 Actions 拥有写回仓库的权限
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (stdlib-only, quick pass)
        run: |
          python --version
          # 当前 requirements.txt 是空的（stdlib 跑），这里留着以便后续加包
          if [ -f requirements.txt ]; then
            pip install --upgrade pip
            pip install -r requirements.txt || true
          fi

      - name: Pre-flight · DeepSeek balance check
        # 真数据流水线开跑前先查余额；< ¥5 直接 fail，避免静默烧到 402
        # mock / push 触发不耗钱跳过这步
        if: ${{ github.event.inputs.use_mock != 'true' && github.event_name != 'push' }}
        env:
          LLM_API_KEY:  ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || 'https://api.deepseek.com/v1' }}
        run: |
          set -e
          python -m app.check_balance --threshold 5

      - name: Run daily pipeline
        env:
          # 从 GitHub Secrets 注入（仓库 Settings → Secrets → Actions 里加）
          LLM_API_KEY:    ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL:   ${{ secrets.LLM_BASE_URL || 'https://api.deepseek.com/v1' }}
          # 关键：硬写 deepseek-chat，故意忽略 secrets.LLM_MODEL
          # 历史教训：5/22 secrets 里 LLM_MODEL 被改成 deepseek-v4-pro 后，
          # 单周烧掉 ¥91；此后所有模型切换必须改这里（留 git 历史可追溯），
          # 不再走 secret（secret 的值在 UI 上不可见，无法审计）
          LLM_MODEL:      "deepseek-chat"
          LLM_CONCURRENCY: "4"
          # 智能双评：第一次评分 ≥ 该阈值才二评取高，<阈值只评一次（省 ~35% 成本，top10 质量零损失）
          # 改 0 = 全部双评（恢复旧行为）；改 11 = 全部单评（最省）
          LLM_DOUBLE_PASS_THRESHOLD: "7"
          # chat-vs-pro A/B 验证启用天数（首次跑流水线后开始计时；过了自动停）
          # ⚠️ 2026-06-02 紧急关闭：deepseek-reasoner 推理模型单次输出 30k-60k tokens
          # （含"思考链"），单次成本 ¥0.30-0.50，远超 quality_ab.py 注释里 ¥0.013 的预估。
          # 6/1 单天 AB + 4 次流水线重跑 = 烧掉 ¥52.71（充值后立刻清零）。
          # 修复方案：先关 A/B；如未来要重启，必须先在 quality_ab.py 给 reasoner 调用
          # 加 max_tokens=2000 截断思考链，并实测验证成本预估准确。
          AB_VALIDATION_DAYS: "0"
        run: |
          set -e
          # 定时触发 & 手动触发无 mock 时走真数据
          HOURS="${{ github.event.inputs.hours || '24' }}"
          RESCORE_FLAG=""
          if [ "${{ github.event.inputs.rescore_all }}" = "true" ]; then
            RESCORE_FLAG="--rescore-all"
            echo "[ci] ⚠️⚠️⚠️ rescore_all 已开启，预计消耗 ¥10-20（按库内 1000 篇估算）"
          fi
          if [ "${{ github.event.inputs.use_mock }}" = "true" ] || [ "${{ github.event_name }}" = "push" ]; then
            echo "[ci] 运行 mock 流水线（冒烟测试）"
            python -m scripts.ci_run --use-mock $RESCORE_FLAG
          else
            echo "[ci] 运行真数据流水线（hours=$HOURS, rescore=$RESCORE_FLAG, model=$LLM_MODEL）"
            python -m scripts.ci_run --hours "$HOURS" $RESCORE_FLAG
          fi

      - name: Commit today.json + archive
        # 关键：push 事件跑的是 --use-mock 冒烟测试，产物不能污染生产数据
        # 只有定时 / 手动触发（真数据）才允许 commit
        if: github.event_name != 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 只提交 today.json / last_run.json / archive；briefing.db 另行处理（见下）
          git add -A data/today.json data/last_run.json data/archive/
          # briefing.db 加进来可以保持评分历史（否则每天从零抓），仓库会慢慢变大
          # 前 3 个月可以跟踪；之后再决定要不要 gitignore
          if [ -f data/briefing.db ]; then
            git add -f data/briefing.db || true
          fi

          if git diff --cached --quiet; then
            echo "[ci] 无新数据变化，跳过 commit"
            exit 0
          fi

          git commit -m "chore(data): daily briefing refresh $(date -u +%Y-%m-%dT%H:%MZ)"

          # 关键：push 前先 rebase 远程最新 main
          # 避免用户本地刚 push 过一个 commit（比如改 vercel.json）导致 non-fast-forward 失败
          # --rebase --autostash 能把我们这个 data commit "摞到"远程最新 commit 后面
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin main && git push; then
              echo "[ci] push 成功（第 $attempt 次尝试）"
              exit 0
            fi
            echo "[ci] push 失败，等 5 秒重试..."
            sleep 5
          done
          echo "[ci] push 连续失败 3 次，放弃"
          exit 1

      - name: Upload today.json as artifact (便于调试)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: today-json-${{ github.run_id }}
          path: data/today.json
          retention-days: 30
